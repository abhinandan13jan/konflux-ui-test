apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: run-local
spec:
  steps:
    - name: run-podman
      image: quay.io/carawang/konflux-ui-test:dummy-konflux-ui-e2e-2-zsblv
      # image: alpine
      onError: continue
      # workingDir: /var/workdir
      script: |
         #!/bin/bash
          set -euo pipefail
          cat /etc/os-release
          whoami
          ls
          echo "running pr-check"
          yarn start
          cd ./artifacts
          ls
          cd ../
          export CYPRESS_GH_TOKEN='asdf'
          ./entrypoint.sh ./e2e/tests/basic-happy-path.spec.ts
          exit 0