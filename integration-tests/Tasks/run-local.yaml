apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: run-local
spec:
  steps:
    - name: run-podman
      image: quay.io/konflux-ci/tekton-integration-catalog/utils:latest
      onError: continue
      workingDir: /var/workdir
      script: |
        #!/bin/sh
        ls
        echo "installing podman dnf"
        dnf install -y podman
        echo "installing podman apt"
        apt install -y podman
        podman --version
        echo "running podman top"
        podman top
        podman build -t "quay.io/konflux_ui_qe/konflux-ui-tests:latest"