apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: run-local
spec:
  steps:
    - name: run-podman
      image: quay.io/konflux-ci/tekton-integration-catalog/utils:latest
      # image: alpine
      onError: continue
      workingDir: /var/workdir
      script: |
        #!/bin/sh
        ls
        cat /etc/os-release
        echo "installing podman and shadow tools"
        dnf install -y podman shadow-utils
        # Podman might need this
        dnf reinstall -y shadow-utils

        # Allowing the files to be executed by all users
        chmod 0755 /usr/bin/newuidmap /usr/bin/newgidmap

        # Setting needed capacity
        setcap cap_setuid+ep /usr/bin/newuidmap
        setcap cap_setgid+ep /usr/bin/newgidmap

        # Removing Setuid and Setgid bits
        chmod -s /usr/bin/newuidmap
        chmod -s /usr/bin/newgidmap
        echo "run podman hello world"
        podman run --userns=auto hello-world