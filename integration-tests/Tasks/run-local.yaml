apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: run-local
spec:
  steps:
    - name: run-podman
      image: quay.io/buildah/stable
      # image: alpine
      onError: continue
      script: |
         #!/bin/bash
          set -euo pipefail
          cat /etc/os-release
          whoami
          ls
          echo "running buildah"
          buildah info
          exit 0