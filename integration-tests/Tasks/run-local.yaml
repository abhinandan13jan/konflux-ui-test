apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: run-local
spec:
  steps:
    - name: run-podman
      image: quay.io/podman/stable:latest
      # image: alpine
      onError: continue
      # workingDir: /var/workdir
      script: |
         #!/bin/bash
          set -euo pipefail
          cat /etc/os-release
          whoami
          ls
          git clone https://github.com/konflux-ci/konflux-ui
          ./pr_check.sh test-stage
          exit 0