apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: run-local
spec:
  steps:
    - name: run-podman
      image: quay.io/konflux-ci/tekton-integration-catalog/utils:latest
      # image: alpine
      onError: continue
      workingDir: /var/workdir
      script: |
        #!/bin/sh
        ls
        cat /etc/os-release
        echo "installing podman and shadow tools"
        dnf install -y podman shadow-utils
        echo "current subuid"
        grep $(whoami) /etc/subuid
        grep $(whoami) /etc/subgid
        echo "updating subuid"
        usermod --add-subuids 200000-400000 --add-subgids 200000-400000 $(whoami)
        echo "new subuid"
        grep $(whoami) /etc/subuid
        grep $(whoami) /etc/subgid
        chmod 0755 /usr/bin/newuidmap /usr/bin/newgidmap
        echo "run podman hello world"
        podman run hello-world