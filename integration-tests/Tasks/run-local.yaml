apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: run-local
spec:
  steps:
    - name: run-podman
      image: quay.io/konflux_ui_qe/konflux-ui-tests:latest
      # image: alpine
      onError: continue
      workingDir: /var/workdir
      script: |
         #!/bin/bash
          set -euo pipefail
          cat /etc/os-release
          npm -v
          echo "cloning konflux-ui for pr-check script"
          git clone "https://github.com/konflux-ci/konflux-ui.git" .
          echo "listing all directories - new files"
          echo "running pr-check"
          exit 0