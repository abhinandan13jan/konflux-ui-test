apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: run-local
spec:
  steps:
    - name: run-podman
      image: quay.io/konflux-ci/tekton-integration-catalog/utils:latest
      onError: continue
      workingDir: /var/workdir
      script: |
        #!/bin/sh
        ls
        whoami
        echo "installing podman and shadow tools"
        dnf install -y podman shadow-utils
        echo "update subuid"
        usermod --add-subuids 100000-165535 --add-subgids 100000-165535 $(whoami)
        echo "installing docker"
        podman run hello-world